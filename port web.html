<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galaxy Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Poppins',sans-serif;
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

/* BACKGROUND */
body::before{
  content:''; position:fixed; width:100%; height:100%;
  background:#000 url('https://i.ibb.co/N6D6wXK/galaxy-stars.jpg') repeat;
  z-index:0;
}

section{position:relative; z-index:1; padding-bottom:60px;}

/* HEADINGS */
h2{text-align:center; margin:80px 0 30px; font-size:2.2rem; text-shadow:0 0 10px #ff99ff;}

/* HERO */
.about-hero{min-height:100vh; display:flex; align-items:center; justify-content:center;}
.about-hero-container{
  display:flex; justify-content:space-between; align-items:center;
  width:90%; max-width:1300px; gap:80px; transform:scale(1.1);
}
.about-text h1{font-size:5rem; line-height:1.05; text-shadow:0 0 30px #ff99ff;}
.about-text p{font-size:1.2rem; margin-top:15px; color:#ccc; max-width:500px;}
.about-image{display:flex; justify-content:flex-end;}
.about-image img{
  width:420px; height:420px; border-radius:50%; object-fit:cover;
  box-shadow:0 0 40px rgba(255,153,255,0.4);
}

/* SLIDER */
.slider-wrapper{overflow:hidden;}
.slider{
  display:flex;
  gap:20px;
  animation:scroll 45s linear infinite;
}
@keyframes scroll{
  from{transform:translateX(0)}
  to{transform:translateX(-50%)}
}
.slide{
  min-width:280px;
  height:360px;
  border-radius:20px;
  overflow:hidden;
  cursor:pointer;
}
.slide img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:25px;
  max-width:1100px;
  margin:auto;
}

/* CARD */
.card{cursor:pointer; border-radius:20px; overflow:hidden; transition:.2s;}
.card img{width:100%; height:260px; object-fit:cover;}
.card:hover{
  box-shadow:0 10px 30px rgba(255,153,255,0.4),
             0 0 25px rgba(255,153,255,0.3);
}

/* CONTACT */
.contact-icons{
  max-width:500px;
  margin:20px auto 120px;
  display:flex;
  flex-direction:column;
  gap:15px;
}
.contact-item{
  background:rgba(20,20,40,0.9);
  padding:15px;
  border-radius:15px;
  text-align:center;
}
.contact-item a{color:#fff;text-decoration:none;}

/* MODAL */
.modal{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.95);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  opacity:0;
  pointer-events:none;
  transition:.3s;
  z-index:9999;
}
.modal.active{
  opacity:1;
  pointer-events:auto;
}
.modal img{
  max-width:70%;
  max-height:70%;
  border-radius:20px;
  margin-bottom:20px;
}
</style>
</head>

<body>

<!-- ABOUT -->
<section class="about-hero">
  <div class="about-hero-container">
    <div class="about-text">
      <h1>Hi, I'm Jienne Khalil</h1>
      <p>I’m a passionate graphic designer, illustrator, and digital artist. I love creating vibrant, immersive visuals and unique art experiences that tell a story.</p>
    </div>
    <div class="about-image">
      <img src="JIENNE.png">
    </div>
  </div>
</section>

<!-- FEATURED -->
<section>
  <h2>Featured Works</h2>
  <div class="slider-wrapper">
    <div class="slider"></div>
  </div>
</section>

<!-- PROJECTS -->
<section>
  <h2>All Projects</h2>
  <div class="grid"></div>
</section>

<!-- CONTACT -->
<section>
  <h2>Contact</h2>
  <div class="contact-icons">
    <div class="contact-item">📧 jiennekhalill@gmail.com</div>
    <div class="contact-item"><a href="https://github.com/jiennekhalil" target="_blank">GitHub</a></div>
    <div class="contact-item"><a href="https://www.linkedin.com/in/jienne-khalil-lechuga-7642b7371/" target="_blank">LinkedIn</a></div>
  </div>
</section>

<!-- MODAL -->
<div class="modal" id="modal">
  <button onclick="closeModal()" style="position:absolute; top:20px; right:30px; font-size:30px; background:none; border:none; color:white; cursor:pointer;">✕</button>
  <img id="modal-img">
  <h3 id="modal-title"></h3>
  <p id="modal-desc"></p>
</div>

<script>
/* MODAL */
function openModal(img,title,desc){
  const modal=document.getElementById('modal');
  modal.classList.add('active');
  document.getElementById('modal-img').src=img;
  document.getElementById('modal-title').innerText=title;
  document.getElementById('modal-desc').innerHTML=desc;
}
function closeModal(){
  document.getElementById('modal').classList.remove('active');
}
document.getElementById('modal').addEventListener('click',function(e){
  if(e.target.id==='modal'){closeModal();}
});

/* PROJECT DATA */
const projects = [
  { img: 'proj 1.jpg', title: 'Organization Project', desc: 'Bronze sponsors post (AdobePhotoshop).' },
  { img: 'proj 2.jpg', title: 'Organization Project', desc: 'Gold sponsors post (Adobe Photoshop).' },
  { img: 'proj 3.jpg', title: 'Organization Project', desc: 'Silver sponsors post (Adobe Photoshop).' },
  { img: 'proj 4.jpg', title: 'Organization Project', desc: 'Media partners post (Adobe Photoshop).' },
  { img: 'proj 5.jpg', title: 'Organization Project', desc: 'Diamond sponsors post (Adobe Photoshop).' },
  { img: 'proj 6.jpg', title: 'Organization Project', desc: 'About me page (Adobe Photoshop).' },
  { img: 'proj 7.jpg', title: 'Organization Project', desc: 'About me description (Adobe Photoshop).' },
  { img: 'proj 7.1.png', title: 'Organization Project', desc: 'Program Overview (Adobe Photoshop).' },
  { img: 'proj 8.png', title: 'Self Project', desc: '“Echoes They Tried to Bury” (Canva).' },
  { img: 'proj 8.1.png', title: 'Commission Project', desc: '“History of Globalization” (Canva).' },
  { img: 'proj 9.png', title: 'Commission Project', desc: 'Organization Poster (Canva).' },
  { img: 'proj 10.png', title: 'Self Project', desc: '"The Power of Our Voices" (Canva).' },
  { img: 'proj 11.png', title: 'Internship Project', desc: '2D Game Character Design (Krita).' },
  { img: 'proj 12.png', title: 'Internship Project', desc: '2D Game Character design (Krita).' },
  { img: 'proj 13.png', title: 'Internship Project', desc: '2D Game Character Design (Krita).' },
  { img: 'proj 14.png', title: 'Internship Project', desc: '2D Game Environment Design (Krita).' }
];

/* GRID */
const grid = document.querySelector('.grid');
projects.forEach(project => {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `<img src="${project.img}">`;
  card.addEventListener('click', () => openModal(project.img, project.title, project.desc));
  grid.appendChild(card);
});

/* SLIDER (AUTO SYNCED) */
const slider = document.querySelector('.slider');

projects.forEach(project => {
  const slide = document.createElement('div');
  slide.className = 'slide';
  slide.innerHTML = `<img src="${project.img}">`;
  slide.addEventListener('click', () => openModal(project.img, project.title, project.desc));
  slider.appendChild(slide);
});

// duplicate for infinite scroll
projects.forEach(project => {
  const slide = document.createElement('div');
  slide.className = 'slide';
  slide.innerHTML = `<img src="${project.img}">`;
  slider.appendChild(slide);
});
</script>

</body>
</html>
